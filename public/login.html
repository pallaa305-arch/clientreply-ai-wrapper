<!doctype html>
<html>
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Login - ClientReply AI</title>
<style>
  body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
  .card{background:white;border-radius:16px;padding:40px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
  h1{color:#1a1a2e;margin:0 0 8px;text-align:center}
  .subtitle{color:#666;text-align:center;margin-bottom:24px}
  input{width:100%;padding:14px;border:2px solid #e5e7eb;border-radius:10px;margin:8px 0;font-size:16px;box-sizing:border-box}
  input:focus{border-color:#6366f1;outline:none}
  button{width:100%;padding:14px;background:#6366f1;color:white;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px}
  button:hover{background:#4f46e5}
  .error{background:#fee2e2;color:#dc2626;padding:12px;border-radius:8px;margin:16px 0;font-size:14px}
  .success{background:#dcfce7;color:#16a34a;padding:12px;border-radius:8px;margin:16px 0;font-size:14px}
  .features{background:#f5f7ff;padding:16px;border-radius:10px;margin:20px 0}
  .features li{color:#374151;margin:8px 0}
  .price-tag{text-align:center;font-size:32px;font-weight:bold;color:#6366f1;margin:16px 0}
  .price-tag span{font-size:14px;color:#666;font-weight:normal}
  .tabs{display:flex;margin-bottom:20px}
  .tab{flex:1;padding:12px;text-align:center;cursor:pointer;border-bottom:2px solid #e5e7eb;color:#666}
  .tab.active{border-color:#6366f1;color:#6366f1;font-weight:600}
  .hidden{display:none}
</style>
</head>
<body>
  <div class="card">
    <h1>ClientReply AI</h1>
    <p class="subtitle" id="subtitle">Login to your account</p>
    
    <div class="tabs">
      <div class="tab active" onclick="showTab('login')" id="tab-login">Login</div>
      <div class="tab" onclick="showTab('signup')" id="tab-signup">Sign Up</div>
    </div>
    
    <div id="msg"></div>
    
    <!-- Login Form -->
    <div id="login-form">
      <input type="email" id="login-email" placeholder="Email" />
      <input type="password" id="login-password" placeholder="Password" />
      <button onclick="login()">Login</button>
    </div>
    
    <!-- Sign Up Form -->
    <div id="signup-form" class="hidden">
      <input type="text" id="signup-name" placeholder="Your Name" />
      <input type="email" id="signup-email" placeholder="Email" />
      <input type="password" id="signup-password" placeholder="Create Password" />
      <input type="password" id="signup-confirm" placeholder="Confirm Password" />
      <button onclick="signup()">Create Account</button>
    </div>
    
    <div class="features">
      <strong>What you get:</strong>
      <ul>
        <li>Generate client replies in seconds</li>
        <li>Professional email proposals</li>
        <li>Bid pitches & follow-ups</li>
        <li>Price justifications</li>
      </ul>
      <div class="price-tag">₹499<span>/month</span></div>
    </div>
    
    <p style="text-align:center;font-size:14px;color:#666;">
      Free: 5 generations/day<br>
      Pro: Unlimited + Priority
    </p>
  </div>

  <script>
    function showTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
      document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
      document.getElementById('signup-form').classList.toggle('hidden', tab !== 'signup');
      document.getElementById('subtitle').textContent = tab === 'login' ? 'Login to your account' : 'Create new account';
      document.getElementById('msg').innerHTML = '';
    }
    
    function generateKey() {
      return 'user_' + Math.random().toString(36).substr(2, 9) + Date.now().toString(36);
    }
    
    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      
      if (!email || !password) {
        document.getElementById('msg').innerHTML = '<div class="error">Please enter email and password</div>';
        return;
      }
      
      // Get stored users and check credentials
      try {
        const res = await fetch('/api/user/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password})
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('clientreply_userkey', data.userKey);
          localStorage.setItem('clientreply_email', email);
          window.location.href = '/app.html?userKey=' + data.userKey;
        } else {
          document.getElementById('msg').innerHTML = '<div class="error">' + (data.error || 'Invalid credentials') + '</div>';
        }
      } catch(e) {
        document.getElementById('msg').innerHTML = '<div class="error">Login failed. Try signing up.</div>';
      }
    }
    
    async function signup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      
      if (!name || !email || !password) {
        document.getElementById('msg').innerHTML = '<div class="error">Please fill all fields</div>';
        return;
      }
      
      if (password !== confirm) {
        document.getElementById('msg').innerHTML = '<div class="error">Passwords do not match</div>';
        return;
      }
      
      if (password.length < 4) {
        document.getElementById('msg').innerHTML = '<div class="error">Password must be at least 4 characters</div>';
        return;
      }
      
      // Generate userKey
      const userKey = generateKey();
      
      // Save user to server
      try {
        const res = await fetch('/api/user/register', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({userKey, email, name, password})
        });
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('clientreply_userkey', userKey);
          localStorage.setItem('clientreply_email', email);
          localStorage.setItem('clientreply_name', name);
          window.location.href = '/app.html?userKey=' + userKey;
        } else {
          document.getElementById('msg').innerHTML = '<div class="error">' + (data.error || 'Registration failed') + '</div>';
        }
      } catch(e) {
        document.getElementById('msg').innerHTML = '<div class="error">Registration failed. Try again.</div>';
      }
    }
  </script>
</body>
</html>
