<!doctype html>
<html>
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Auto Activate</title>
<style>
  body{font-family:Arial,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
  .card{background:white;padding:40px;border-radius:16px;text-align:center;max-width:400px;width:100%}
  h1{color:#6366f1}
  .btn{padding:16px 32px;background:#22c55e;color:white;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;margin:10px}
  .result{padding:20px;border-radius:10px;margin:20px 0;font-size:18px}
  .success{background:#dcfce7;color:#16a34a}
  .error{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
  <div class="card">
    <h1>🔧 Auto Activate</h1>
    <p id="status">Activating...</p>
    <div id="result" class="result" style="display:none"></div>
  </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const userKey = params.get('key');
    const savedSecret = localStorage.getItem('clientreply_admin_secret') || '';
    const urlSecret = params.get('secret') || '';
    const adminSecret = urlSecret || savedSecret;

    function showResult(type, html) {
      const result = document.getElementById('result');
      result.style.display = 'block';
      result.className = 'result ' + type;
      result.innerHTML = html;
    }

    async function activateNow(secret) {
      try {
        const res = await fetch('/api/pro/manual-activate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({userKey: userKey, adminSecret: secret})
        });
        const data = await res.json();
        if (data.success) {
          showResult('success', '✅ SUCCESS!<br>' + data.message);
          document.getElementById('status').textContent = 'Done!';
        } else {
          showResult('error', '❌ Error:<br>' + data.error);
        }
      } catch(e) {
        showResult('error', '❌ Error:<br>' + e.message);
      }
    }

    if (!userKey) {
      document.getElementById('status').textContent = 'No userKey provided!';
      showResult('error', 'Add ?key=USER_KEY to URL');
    } else if (!adminSecret) {
      document.getElementById('status').textContent = 'Admin secret required';
      showResult('error', 'Add ?secret=ADMIN_SECRET to URL or login on admin page first.');
    } else {
      document.getElementById('status').textContent = 'Activating user: ' + userKey;
      activateNow(adminSecret);
    }
  </script>
</body>
</html>
