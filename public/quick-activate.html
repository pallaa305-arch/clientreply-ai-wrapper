<!doctype html>
<html>
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Quick Activate</title>
<style>
  body{font-family:Arial,sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;padding:20px}
  .card{background:white;padding:40px;border-radius:16px;text-align:center;max-width:400px;width:100%}
  h1{color:#22c55e}
  .btn{padding:16px 32px;background:#22c55e;color:white;border:none;border-radius:10px;font-size:18px;font-weight:600;cursor:pointer;margin:10px}
  .result{padding:20px;border-radius:10px;margin:20px 0;font-size:18px}
  .success{background:#dcfce7;color:#16a34a}
  .error{background:#fee2e2;color:#dc2626}
</style>
</head>
<body>
  <div class="card">
    <h1>🚀 Activating...</h1>
    <div id="result"></div>
  </div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const userKey = params.get('key');
    const savedSecret = localStorage.getItem('clientreply_admin_secret') || '';
    const secret = params.get('secret') || savedSecret;

    if (!userKey || !secret) {
      document.getElementById('result').innerHTML = 'Please provide ?key=USER_KEY&secret=ADMIN_SECRET or login on admin page first.';
    } else {
      window.location.href = '/api/pro/activate?userKey=' + encodeURIComponent(userKey) + '&secret=' + encodeURIComponent(secret);
    }
  </script>
</body>
</html>
